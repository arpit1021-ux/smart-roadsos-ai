version: '3.8'

services:
  mongodb:
    image: mongo:5
    container_name: roadsos-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - roadsos-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roadsos-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password@mongodb:27017/roadsos?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      AI_SERVICE_URL: http://ai-module:5001
      FRONTEND_URL: http://localhost
    depends_on:
      - mongodb
      - ai-module
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - roadsos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-module:
    build:
      context: ./ai-module
      dockerfile: Dockerfile
    container_name: roadsos-ai
    restart: always
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: 0
    volumes:
      - ./ai-module/model:/app/model
    networks:
      - roadsos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roadsos-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - roadsos-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  roadsos-network:
    driver: bridge
